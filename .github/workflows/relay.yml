name: Exchange Ticker Relay

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:  # manual trigger

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run relay
        run: node relay.mjs
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          RELAY_AUTH_KEY: ${{ secrets.RELAY_AUTH_KEY }}
